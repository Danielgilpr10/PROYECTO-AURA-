<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Caracterización Estudiantil</title>


    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/academy.css">
</head>

<body>

    <!-- Caja principal -->
    <div class="caja-principal">

        <!-- Parte superior con el título -->
        <header class="parte-superior">
            <a href="index.html" class="boton-volver">← Volver</a>

            <img src="/img/logo.png" alt="Logo de AURA" class="logo-aura">

            <h1>Formulario de Caracterización Estudiantil</h1>

        </header>


        <section class="menu-secciones">


            <div class="seccion-menu">
                <div class="circulo-icono">
                    <i class="bx bx-user"></i>
                </div>
                <p>Datos personales</p>
            </div>


            <div class="seccion-menu seccion-activa">
                <div class="circulo-icono">
                    <i class="bx bx-book-open"></i>
                </div>
                <p>Información académica</p>
            </div>

            <div class="seccion-menu">
                <div class="circulo-icono">
                    <i class="bx bx-briefcase"></i>
                </div>
                <p>Situación socioeconómica</p>
            </div>

            <div class="seccion-menu">
                <div class="circulo-icono">
                    <i class="bx bx-brain"></i>
                </div>
                <p>Aspectos psicosociales</p>
            </div>

            <div class="seccion-menu">
                <div class="circulo-icono">
                    <i class="bx bx-first-aid"></i>
                </div>
                <p>Salud y bienestar</p>
            </div>

        </section>


        <!-- Formulario --> JUAN DAVID
        <form action="socioeconomic.html">
            <section class="seccion-formulario">
                <h2>Información académica</h2>
                <div class="grupo">
                    <label>Programa Académico *</label>
                    <input type="text" placeholder="Ej: Ingeniería de Sistemas" required>
                </div>


                <div class="grupo">
                    <label>Semestre actual *</label>
                    <select required>
                        <option value="">Seleccione</option>
                        <option>1° Semestre</option>
                        <option>2° Semestre</option>
                        <option>3° Semestre</option>
                        <option>4° Semestre</option>
                    </select>
                </div>

                <div class="grupo">
                    <label>Promedio académico *</label>
                    <input type="number" placeholder="Ej: 3.5" min="0" max="5" step="0.1" required>
                </div>


                <div class="grupo">
                    <label>Porcentaje de asistencia *</label>

                    <select required>
                        <option value="">Seleccione</option>
                        <option>Menos del 50%</option>
                        <option>50% - 70%</option>
                        <option>70% - 90%</option>
                        <option>Más del 90%</option>
                        <option>Nunca falto</option>
                    </select>
                </div>

                <div class="grupo">
                    <label>Horas de estudio diarias *</label>
                    <select required>
                        <option value="">Seleccione</option>
                        <option>Menos de 1 hora</option>
                        <option>1 - 2 horas</option>
                        <option>2 - 3 horas</option>
                        <option>Más de 3 horas</option>
                    </select>
                </div>

            </section>
            <section class="seccion-botones">
                <button type="button" class="boton-anterior" onclick="location.href='data.html'">Anterior</button>
                <button type="submit" class="boton-siguiente">Siguiente</button>
            </section>

        </form>
    </div>
</body>

</html>
